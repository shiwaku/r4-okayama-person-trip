<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>岡山県 時刻別滞留人口</title>
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/pmtiles@4.4.1/dist/pmtiles.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 100vw; height: 100vh; overflow: hidden; font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; }
    #map { position: absolute; inset: 0; }

    #panel {
      position: absolute;
      top: 10px; left: 10px;
      background: rgba(20, 20, 30, 0.88);
      color: #fff;
      border-radius: 8px;
      backdrop-filter: blur(4px);
      user-select: none;
      min-width: 170px;
    }

    /* 常時表示ヘッダー */
    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }
    #header-info {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    #day-label {
      font-size: 11px;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }
    #hour-display {
      font-size: 22px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
      line-height: 1;
    }
    #toggle-icon {
      font-size: 10px;
      opacity: 0.6;
      flex-shrink: 0;
    }

    /* 折りたたみボディ */
    #panel-body {
      overflow: hidden;
      max-height: 120px;
      transition: max-height 0.22s ease, padding 0.22s ease;
      padding: 0 12px 10px;
    }
    #panel-body.collapsed {
      max-height: 0;
      padding-bottom: 0;
    }

    .day-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .day-toggle button {
      flex: 1;
      padding: 5px 0;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: transparent;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .day-toggle button.active {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.7);
    }

    #hour-slider {
      width: 100%;
      margin-bottom: 8px;
      cursor: pointer;
      accent-color: #4393c3;
    }

    #play-btn {
      width: 100%;
      padding: 7px;
      border: none;
      border-radius: 4px;
      background: #4393c3;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #play-btn:hover { background: #2c6e9e; }

    #legend {
      position: absolute;
      bottom: 30px; right: 10px;
      background: rgba(20, 20, 30, 0.85);
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      backdrop-filter: blur(4px);
    }
    #legend h2 {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .legend-swatch {
      width: 14px; height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .maplibregl-popup-content {
      font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="panel">
    <div id="panel-header" onclick="togglePanel()">
      <div id="header-info">
        <span id="day-label">平日</span>
        <span id="hour-display">08:00</span>
      </div>
      <span id="toggle-icon">▲</span>
    </div>
    <div id="panel-body">
      <div class="day-toggle">
        <button id="btn-weekday" class="active" onclick="setDayType('w')">平日</button>
        <button id="btn-holiday" onclick="setDayType('h')">休日</button>
      </div>
      <input type="range" id="hour-slider" min="0" max="23" value="8" step="1">
      <button id="play-btn" onclick="togglePlay()">▶ 再生</button>
    </div>
  </div>

  <div id="legend">
    <h2>滞留人口（推計）</h2>
    <div class="legend-row"><div class="legend-swatch" style="background:#67001f"></div><span>3,000人以上</span></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#b2182b"></div><span>1,000〜3,000人</span></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#d6604d"></div><span>500〜1,000人</span></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#f4a582"></div><span>〜500人</span></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#f7f7f7; border:1px solid #aaa"></div><span>〜195人（中央値）</span></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#92c5de"></div><span>〜50人</span></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#4393c3"></div><span>〜10人</span></div>
    <div class="legend-row"><div class="legend-swatch" style="background:#2166ac"></div><span>1人</span></div>
    <div class="legend-row"><div class="legend-swatch" style="background:rgba(200,200,200,0.3); border:1px solid #555"></div><span>データなし</span></div>
  </div>

  <script>
    const protocol = new pmtiles.Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile.bind(protocol));

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://gsi-cyberjapan.github.io/optimal_bvmap/style/std.json',
      center: [133.92, 34.92],
      zoom: 9,
      attributionControl: {
        customAttribution: '<a href="https://www.okayama-opendata.jp/datasets/6694" target="_blank">岡山県パーソントリップ調査</a>（おかやまオープンデータカタログ）を加工して作成'
      }
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');

    let dayType = 'w';
    let hour = 8;
    let playing = false;
    let timer = null;

    // RdBu_r (blue→white→red), log scale: ln(1)=0 … ln(7000)≈8.86
    // 中央値 ~195人 (ln≈5.27) を白に設定
    const COLOR_STOPS = [
      [0,    '#2166ac'],  // 1人  強青
      [2.30, '#4393c3'],  // 10人
      [3.91, '#92c5de'],  // 50人
      [5.27, '#f7f7f7'],  // ~195人（中央値）白
      [6.21, '#f4a582'],  // 500人
      [6.91, '#d6604d'],  // 1,000人
      [8.01, '#b2182b'],  // 3,000人
      [8.86, '#67001f'],  // 7,000人 強赤
    ];

    function buildColorExpr(prefix, h) {
      const prop = `${prefix}${h}`;
      return [
        'case',
        ['<=', ['coalesce', ['get', prop], 0], 0],
        'rgba(200,200,200,0.15)',
        [
          'interpolate', ['linear'],
          ['ln', ['max', 1, ['coalesce', ['get', prop], 0]]],
          ...COLOR_STOPS.flat()
        ]
      ];
    }

    map.on('load', () => {
      map.addSource('zones', {
        type: 'vector',
        url: 'pmtiles://../data/pmtiles/zone_population_map.pmtiles'
      });

      map.addLayer({
        id: 'zones-fill',
        type: 'fill',
        source: 'zones',
        'source-layer': 'zones',
        paint: {
          'fill-color': buildColorExpr(dayType, hour),
          'fill-opacity': 0.78
        }
      });

      map.addLayer({
        id: 'zones-line',
        type: 'line',
        source: 'zones',
        'source-layer': 'zones',
        paint: {
          'line-color': '#888888',
          'line-width': 0.4,
          'line-opacity': 0.5
        }
      });
    });

    // Hover popup
    const popup = new maplibregl.Popup({ closeButton: false, closeOnClick: false, offset: 8 });

    map.on('mousemove', 'zones-fill', (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const props = e.features[0].properties;
      const pop = Math.round(props[`${dayType}${hour}`] ?? 0);
      popup
        .setLngLat(e.lngLat)
        .setHTML(`<strong>${props.city_name} ${props.town_name}</strong><br>滞留人口: <strong>${pop.toLocaleString()}</strong> 人`)
        .addTo(map);
    });

    map.on('mouseleave', 'zones-fill', () => {
      map.getCanvas().style.cursor = '';
      popup.remove();
    });

    function updateMap() {
      if (!map.getLayer('zones-fill')) return;
      map.setPaintProperty('zones-fill', 'fill-color', buildColorExpr(dayType, hour));
      const timeStr = String(hour).padStart(2, '0') + ':00';
      document.getElementById('hour-display').textContent = timeStr;
      document.getElementById('hour-slider').value = hour;
    }

    function setDayType(type) {
      dayType = type;
      document.getElementById('btn-weekday').classList.toggle('active', type === 'w');
      document.getElementById('btn-holiday').classList.toggle('active', type === 'h');
      document.getElementById('day-label').textContent = type === 'w' ? '平日' : '休日';
      updateMap();
    }

    let panelOpen = true;
    function togglePanel() {
      panelOpen = !panelOpen;
      document.getElementById('panel-body').classList.toggle('collapsed', !panelOpen);
      document.getElementById('toggle-icon').textContent = panelOpen ? '▲' : '▼';
    }

    document.getElementById('hour-slider').addEventListener('input', (e) => {
      hour = parseInt(e.target.value, 10);
      updateMap();
    });

    function togglePlay() {
      playing ? pause() : play();
    }

    function play() {
      playing = true;
      document.getElementById('play-btn').textContent = '⏸ 停止';
      timer = setInterval(() => {
        hour = (hour + 1) % 24;
        updateMap();
      }, 800);
    }

    function pause() {
      playing = false;
      document.getElementById('play-btn').textContent = '▶ 再生';
      clearInterval(timer);
      timer = null;
    }
  </script>
</body>
</html>
